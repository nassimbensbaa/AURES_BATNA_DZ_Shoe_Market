<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر الأحذية</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{text-align:center;background:#111;color:#fff;padding:10px}
img{max-width:100%}

.container{max-width:500px;margin:auto;padding:10px;background:#fff}

.colors button{
margin:5px;
padding:5px 10px;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png" style="height:60px">
</header>

<div class="container">

<img id="mainImg" src="">

<h3 id="name"></h3>

<div id="colors"></div>

<input id="fullName" placeholder="الاسم الكامل"><br><br>

<select id="wilaya"></select>

<select id="type">
<option value="home">منزل</option>
<option value="office">مكتب</option>
</select>

<button onclick="send()">تأكيد الطلب</button>

</div>

<script>

let PRODUCTS=[]
let DELIVERY=[]
let selected=null

async function load(){

PRODUCTS = await fetch("/api/products").then(r=>r.json())
DELIVERY = await fetch("/api/delivery").then(r=>r.json())

showProduct()

loadWilaya()

}

function showProduct(){

selected = PRODUCTS[0]

document.getElementById("mainImg").src = selected.image

document.getElementById("name").innerText = selected.name

let html=""

PRODUCTS.forEach(p=>{

html+=`
<button onclick="change('${p.image}','${p.color}')">
${p.color}
</button>
`

})

document.getElementById("colors").innerHTML=html

}

function change(img,color){

document.getElementById("mainImg").src = img

selected.image = img

selected.color = color

}

function loadWilaya(){

let html=""

DELIVERY.forEach(d=>{
html+=`<option value="${d.wilaya}">${d.wilaya}</option>`
})

document.getElementById("wilaya").innerHTML=html

}

async function send(){

let wilaya=document.getElementById("wilaya").value
let type=document.getElementById("type").value

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
productId:selected.id,
productName:selected.name,
color:selected.color,
wilaya:wilaya,
type:type,
qty:1
})
})

alert("تم الطلب")

}

load()

</script>

</body>
</html>
