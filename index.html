<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nike Air</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.product{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

@media(max-width:768px){
.product{
grid-template-columns:1fr;
}
}

.gallery img{
width:100%;
border-radius:15px;
object-fit:cover;
}

.thumb-list{
display:flex;
gap:10px;
margin-top:10px;
}

.thumb-list img{
width:80px;
height:80px;
object-fit:cover;
cursor:pointer;
border-radius:10px;
border:2px solid transparent;
}

.thumb-list img:hover{
border-color:#000;
}

.title{
font-size:32px;
font-weight:700;
margin-bottom:10px;
}

.price{
font-size:30px;
font-weight:bold;
color:#e63946;
margin-bottom:15px;
}

.section-title{
margin:15px 0 10px;
font-size:18px;
font-weight:700;
}

.colors,.sizes{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.color-btn,.size-btn{
padding:10px 15px;
border:none;
cursor:pointer;
background:#eee;
border-radius:10px;
font-weight:bold;
}

.color-btn.active,.size-btn.active{
background:#111;
color:#fff;
}

.stock{
margin-top:10px;
font-weight:bold;
color:green;
}

.order-box{
margin-top:25px;
padding:20px;
background:#fafafa;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.delivery-type{
display:flex;
gap:15px;
margin:10px 0;
}

.summary{
margin-top:15px;
line-height:2;
font-size:18px;
font-weight:bold;
}

.order-btn{
width:100%;
padding:15px;
background:#111;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.success{
display:none;
margin-top:20px;
padding:15px;
background:#d4edda;
color:#155724;
border-radius:10px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="product">

<!-- IMAGE -->
<div class="gallery">

<img id="mainImage" src="" alt="product">

<div class="thumb-list">

<img id="thumb1">
<img id="thumb2">

</div>

</div>

<!-- INFO -->
<div>

<div class="title">Nike Air</div>

<div class="price">
<span id="productPrice">0</span> دج
</div>

<div class="section-title">الألوان المتوفرة</div>
<div id="colors" class="colors"></div>

<div class="section-title">المقاسات المتوفرة</div>
<div id="sizes" class="sizes"></div>

<div class="stock">
المتوفر: <span id="stockQty">0</span>
</div>

<div class="order-box">

<input id="fullName" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">

<select id="wilaya"></select>

<div class="delivery-type">

<label>
<input type="radio" name="delivery" value="home" checked>
المنزل
</label>

<label>
<input type="radio" name="delivery" value="office">
المكتب
</label>

</div>

<div class="summary">
سعر الحذاء: <span id="shoePrice">0</span> دج<br>
التوصيل: <span id="shippingPrice">0</span> دج<br>
الإجمالي: <span id="totalPrice">0</span> دج
</div>

<button class="order-btn" onclick="sendOrder()">اطلب الآن</button>

<div id="success" class="success"></div>

</div>

</div>

</div>

</div>

<script>

let PRODUCTS=[];
let DELIVERY=[];
let currentColor="";
let currentSize="";
let currentProduct=null;

async function loadData(){

try{

const res=await fetch('/api/products');
const data=await res.json();

PRODUCTS=data.products||[];
DELIVERY=data.delivery||[];

buildColors();
buildWilayas();

}catch(err){
alert("خطأ في تحميل البيانات");
}
}

/* COLORS */
function buildColors(){

const colors=[...new Set(PRODUCTS.map(x=>x.color))];
const div=document.getElementById("colors");

div.innerHTML="";

colors.forEach(c=>{
const btn=document.createElement("button");
btn.className="color-btn";
btn.textContent=c;
btn.onclick=()=>selectColor(c);
div.appendChild(btn);
});

if(colors.length) selectColor(colors[0]);
}

/* SELECT COLOR */
function selectColor(color){

currentColor=color;

document.querySelectorAll(".color-btn").forEach(b=>{
b.classList.toggle("active",b.textContent===color);
});

const items=PRODUCTS.filter(x=>x.color===color);

if(!items.length) return;

currentProduct=items[0];

/* ✅ IMAGE FROM FOLDER */
const imgPath="images/"+currentProduct.image;

document.getElementById("mainImage").src=imgPath;
document.getElementById("thumb1").src=imgPath;
document.getElementById("thumb2").src=imgPath;

/* CLICK THUMBS */
document.getElementById("thumb1").onclick=()=>{
document.getElementById("mainImage").src=imgPath;
};

document.getElementById("thumb2").onclick=()=>{
document.getElementById("mainImage").src=imgPath;
};

document.getElementById("productPrice").innerText=currentProduct.price;
document.getElementById("shoePrice").innerText=currentProduct.price;

buildSizes(items);
updateTotal();
}

/* SIZES */
function buildSizes(items){

const div=document.getElementById("sizes");
div.innerHTML="";

items.forEach(item=>{
const btn=document.createElement("button");
btn.className="size-btn";
btn.textContent=item.size;
btn.onclick=()=>selectSize(item);
div.appendChild(btn);
});

if(items.length) selectSize(items[0]);
}

function selectSize(item){

currentProduct=item;
currentSize=item.size;

document.querySelectorAll(".size-btn").forEach(b=>{
b.classList.toggle("active",b.textContent==item.size);
});

document.getElementById("stockQty").innerText=item.qty;
document.getElementById("productPrice").innerText=item.price;
document.getElementById("shoePrice").innerText=item.price;

updateTotal();
}

/* DELIVERY */
function buildWilayas(){

const select=document.getElementById("wilaya");
select.innerHTML='<option value="">اختر الولاية</option>';

DELIVERY.forEach(d=>{
const opt=document.createElement("option");
opt.value=d.wilaya;
opt.textContent=d.wilaya;
select.appendChild(opt);
});
}

document.getElementById("wilaya").addEventListener("change",updateTotal);
document.querySelectorAll('input[name="delivery"]').forEach(r=>{
r.addEventListener("change",updateTotal);
});

function getShippingPrice(){

const wilaya=document.getElementById("wilaya").value;
if(!wilaya) return 0;

const type=document.querySelector('input[name="delivery"]:checked').value;
const row=DELIVERY.find(x=>x.wilaya===wilaya);

if(!row) return 0;

return type==="home"?Number(row.home):Number(row.office);
}

function updateTotal(){

if(!currentProduct) return;

const shipping=getShippingPrice();
const total=Number(currentProduct.price)+shipping;

document.getElementById("shippingPrice").innerText=shipping;
document.getElementById("totalPrice").innerText=total;
}

/* SEND ORDER */
async function sendOrder(){

const fullName=document.getElementById("fullName").value.trim();
const phone=document.getElementById("phone").value.trim();
const wilaya=document.getElementById("wilaya").value;

if(!fullName||!phone||!wilaya||!currentProduct){
alert("أكمل المعلومات");
return;
}

const shipping=getShippingPrice();
const total=Number(currentProduct.price)+shipping;

const payload={
id:currentProduct.id,
fullName,
phone,
wilaya,
productName:currentProduct.name,
color:currentProduct.color,
size:currentProduct.size,
price:currentProduct.price,
shippingPrice:shipping,
total
};

try{

const res=await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const result=await res.json();

if(result.ok){

const box=document.getElementById("success");
box.style.display="block";
box.innerHTML="✔ تم إرسال الطلب بنجاح";

}else{
alert("فشل الإرسال");
}

}catch(e){
alert("خطأ في الاتصال");
}
}

loadData();

</script>

</body>
</html>
