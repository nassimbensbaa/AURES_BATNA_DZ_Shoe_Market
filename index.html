<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الأحذية</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
}

header{
    background:#000;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:22px;
}

#products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:15px;
}

.card{
    width:220px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    text-align:center;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card h3{
    margin:10px 0;
    font-size:16px;
}

.card p{
    margin:5px 0;
    font-size:14px;
}

.card input{
    width:80%;
    padding:5px;
    margin:10px 0;
}

.card button{
    width:100%;
    padding:10px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
}

.card button:hover{
    background:#333;
}
</style>
</head>

<body>

<header>
🛒 متجر الأحذية
</header>

<!-- مكان التطبيق + API مخفي -->
<div id="app" data-api="https://script.google.com/macros/s/AKfycbwKOO6mLB28cGmGjC3L9mQTyLgF_vu1xLmDGXKkIET6XsDZPVwZ14e3wkXJCC93goxf/exec"></div>

<div id="products"></div>

<script src="products.js"></script>
<script src="send.js"></script>

</body>
</html>
