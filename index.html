<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الأحذية DZ</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6f8;
}

header{
background:#111;
text-align:center;
padding:10px;
}

header img{
height:70px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.product-box{
background:#fff;
border-radius:15px;
padding:15px;
box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.main-img{
width:100%;
height:320px;
object-fit:contain;
border-radius:10px;
background:#fff;
}

.colors{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

.color-btn{
padding:6px 10px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
background:#eee;
}

.form{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.price-box{
margin-top:10px;
padding:10px;
background:#f1f1f1;
border-radius:8px;
font-weight:bold;
}

.btn{
background:#111;
color:#fff;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png">
</header>

<div class="container">

<div class="product-box">

<img id="img" class="main-img">

<h2 id="name"></h2>

<div id="colors" class="colors"></div>

<div class="form">

<input id="fullName" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">

<select id="wilaya"></select>

<select id="type">
<option value="home">منزل</option>
<option value="office">مكتب</option>
</select>

<div class="price-box" id="price">التوصيل: 0 دج</div>

<button class="btn" onclick="send()">تأكيد الطلب</button>

</div>

</div>

</div>

<script>

let PRODUCTS=[]
let DELIVERY=[]
let current=null

async function load(){

PRODUCTS = await fetch("/api/products").then(r=>r.json())
DELIVERY = await fetch("/api/delivery").then(r=>r.json())

current = PRODUCTS[0]

render()

loadWilaya()

}

function render(){

document.getElementById("img").src = current.image
document.getElementById("name").innerText = current.name

let colors = PRODUCTS.filter(p=>p.id==current.id)

document.getElementById("colors").innerHTML =
colors.map(c=>`
<button class="color-btn" onclick="change('${c.image}','${c.color}')">
${c.color}
</button>
`).join("")

}

function change(img,color){

current.image = img
current.color = color

document.getElementById("img").src = img

}

function loadWilaya(){

document.getElementById("wilaya").innerHTML =
DELIVERY.map(d=>`
<option value="${d.name}">${d.name}</option>
`).join("")

}

document.getElementById("wilaya").onchange =
document.getElementById("type").onchange = calc

function calc(){

let w = document.getElementById("wilaya").value
let t = document.getElementById("type").value

let d = DELIVERY.find(x=>x.name==w)
if(!d) return

let price = t=="home"?d.home:d.office

document.getElementById("price").innerText =
"التوصيل: "+price+" دج"

}

async function send(){

let w = document.getElementById("wilaya").value
let t = document.getElementById("type").value

let d = DELIVERY.find(x=>x.name==w)

let price = t=="home"?d.home:d.office

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
productId:current.id,
productName:current.name,
color:current.color,
size:current.size,
fullName:document.getElementById("fullName").value,
phone:document.getElementById("phone").value,
wilaya:w,
deliveryType:t,
deliveryPrice:price,
productPrice:0,
total:price,
qty:1
})
})

alert("تم الطلب بنجاح ✅")

}

load()

</script>

</body>
</html>
