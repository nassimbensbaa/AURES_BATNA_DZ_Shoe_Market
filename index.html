<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الأحذية DZ</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

header{
background:#111;
text-align:center;
padding:10px;
}

header img{
height:70px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
overflow:hidden;
}

.main-img{
width:100%;
height:320px;
object-fit:contain;
background:#fff;
}

.content{
padding:15px;
}

.title{
font-size:20px;
font-weight:bold;
}

.price{
margin:10px 0;
font-size:18px;
color:#111;
font-weight:bold;
}

.colors{
display:flex;
gap:8px;
flex-wrap:wrap;
margin:10px 0;
}

.color-btn{
padding:6px 12px;
border-radius:20px;
border:1px solid #ddd;
cursor:pointer;
background:#eee;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
}

.delivery-box{
margin-top:10px;
padding:10px;
background:#f1f1f1;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png">
</header>

<div class="container">

<div class="card">

<img id="img" class="main-img">

<div class="content">

<div class="title" id="name"></div>

<div class="price" id="price"></div>

<div class="colors" id="colors"></div>

<input id="fullName" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">

<select id="wilaya"></select>

<select id="type">
<option value="home">منزل</option>
<option value="office">مكتب</option>
</select>

<div class="delivery-box" id="delivery">التوصيل: 0 دج</div>

<button class="btn" onclick="send()">تأكيد الطلب</button>

</div>

</div>

</div>

<script>

let PRODUCTS=[]
let DELIVERY=[]
let current=null

async function load(){

PRODUCTS = await fetch("/api/products").then(r=>r.json())
DELIVERY = await fetch("/api/delivery").then(r=>r.json())

current = PRODUCTS[0]

render()
loadWilaya()

}

function render(){

document.getElementById("img").src = current.image
document.getElementById("name").innerText = current.name
document.getElementById("price").innerText = "السعر: " + current.price + " دج"

let colors = PRODUCTS.filter(p=>p.id==current.id)

document.getElementById("colors").innerHTML =
colors.map(c=>`
<button class="color-btn" onclick="change('${c.image}','${c.color}',${c.price})">
${c.color}
</button>
`).join("")

}

function change(img,color,price){

current.image = img
current.color = color
current.price = price

document.getElementById("img").src = img
document.getElementById("price").innerText = "السعر: " + price + " دج"

}

function loadWilaya(){

document.getElementById("wilaya").innerHTML =
DELIVERY.map(d=>`
<option value="${d.name}">${d.name}</option>
`).join("")

}

document.getElementById("wilaya").onchange =
document.getElementById("type").onchange = calc

function calc(){

let w=document.getElementById("wilaya").value
let t=document.getElementById("type").value

let d=DELIVERY.find(x=>x.name==w)
if(!d)return

let price=t=="home"?d.home:d.office

document.getElementById("delivery").innerText =
"التوصيل: " + price + " دج"

}

async function send(){

let w=document.getElementById("wilaya").value
let t=document.getElementById("type").value

let d=DELIVERY.find(x=>x.name==w)

let deliveryPrice = t=="home"?d.home:d.office

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
productId:current.id,
productName:current.name,
color:current.color,
size:current.size,
fullName:document.getElementById("fullName").value,
phone:document.getElementById("phone").value,
wilaya:w,
deliveryType:t,
productPrice:current.price,
deliveryPrice:deliveryPrice,
qty:1
})
})

alert("تم الطلب بنجاح ✅")

}

load()

</script>

</body>
</html>
