<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر الأحذية</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px}
img{width:100%;height:200px;object-fit:cover}
button{margin:5px;padding:6px 10px}
.modal{position:fixed;inset:0;background:#0008;display:none}
.box{background:#fff;padding:20px;margin:50px auto;width:300px}
</style>
</head>

<body>

<div id="products"></div>

<!-- ORDER -->
<div class="modal" id="modal">
  <div class="box">
    <h3>الطلب</h3>

    <select id="wilaya"></select>
    <br><br>

    <select id="type">
      <option value="home">منزل</option>
      <option value="office">مكتب</option>
    </select>

    <br><br>

    <div id="price"></div>

    <button onclick="confirmOrder()">تأكيد</button>
  </div>
</div>

<script>

const API = "YOUR_GOOGLE_SCRIPT_URL";

let PRODUCTS = [];
let DELIVERY = [];
let SELECTED = null;

async function load(){

  PRODUCTS = await fetch(API+"?action=products").then(r=>r.json());
  DELIVERY = await fetch(API+"?action=delivery").then(r=>r.json());

  render();
}

function render(){

let html = "";

PRODUCTS.forEach((p,i)=>{

html += `
<div class="card">
<img id="img${i}" src="${p.image}">
<h3>${p.name}</h3>

<button onclick="selectColor(${i})">
${p.color}
</button>

<button onclick="openOrder(${i})">طلب</button>
</div>
`;

});

document.getElementById("products").innerHTML = html;
}

function selectColor(i){
  document.querySelectorAll("img")[i].src = PRODUCTS[i].image;
}

function openOrder(i){

SELECTED = PRODUCTS[i];

document.getElementById("modal").style.display="block";

/* wilaya list */
let w = DELIVERY.map(d=>`<option>${d.wilaya}</option>`).join("");
document.getElementById("wilaya").innerHTML = w;

}

document.getElementById("type").onchange =
document.getElementById("wilaya").onchange = function(){

let w = document.getElementById("wilaya").value;
let t = document.getElementById("type").value;

let d = DELIVERY.find(x=>x.wilaya==w);

if(!d) return;

let price = t=="home"?d.home:d.office;

document.getElementById("price").innerText =
"التوصيل: " + price + " دج";
}

async function confirmOrder(){

let w = document.getElementById("wilaya").value;
let t = document.getElementById("type").value;

await fetch(API,{
method:"POST",
body:JSON.stringify({
productId: SELECTED.id,
productName: SELECTED.name,
color: SELECTED.color,
size: SELECTED.size,
wilaya: w,
deliveryType: t,
qty:1
})
});

alert("تم الطلب");
document.getElementById("modal").style.display="none";
}

load();

</script>

</body>
</html>
